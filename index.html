<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KingXcode - 开发者 & 创作者">
    <meta property="og:title" content="KingXcode">
    <meta property="og:description" content="开发者 & 创作者">
    <meta property="og:type" content="website">
    <title>KingXcode</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="#" class="logo">KX</a>
            <button class="nav-toggle" aria-label="切换菜单">
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <p class="hero-greeting">你好，我是</p>
                <h1 class="hero-title">KingXcode</h1>
                <p class="hero-subtitle">开发者 &amp; 创作者</p>
                <p class="hero-desc">用简洁的代码构建优雅的解决方案。</p>
                <div class="hero-links">
                    <a href="https://github.com/KingXcode" class="hero-link" target="_blank" rel="noopener">GitHub</a>
                    <a href="#about" class="hero-link">了解更多 ↓</a>
                </div>
            </div>
            <div class="scroll-indicator">
                <span></span>
            </div>
        </section>

        <!-- About -->
        <section id="about" class="section">
            <div class="container">
                <h2 class="section-title">关于</h2>
                <div class="about-content">
                    <p>我是一名热爱编程的开发者，喜欢用代码将想法变为现实。专注于简洁的架构和极简设计，打造既实用又美观的工具与应用。</p>
                    <p>我的理念很简单：少写代码，多做事。我相信精心打造的软件能够解决真实的问题。</p>
                </div>
            </div>
        </section>

        <!-- Contact -->
        <section id="contact" class="section">
            <div class="container">
                <h2 class="section-title">联系我</h2>
                <p class="contact-text">有项目想法或只是想打个招呼？欢迎随时联系。</p>
                <a href="https://github.com/KingXcode" class="contact-link" target="_blank" rel="noopener">在 GitHub 上找到我 →</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; <span id="year"></span> KingXcode. 简洁构建。</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
